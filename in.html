<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HKB77</title>

<style>

/* ===== GANTI AMP START ===== */
body{
    animation: fadeIn 0.3s ease forwards;
    opacity: 0;
}
@keyframes fadeIn{
    to{opacity:1;}
}

/* ===== RESET ===== */
*{box-sizing:border-box;margin:0;padding:0;}

:root{
    --gold:#d47337;
    --gold-light:#d47337;
    --gold-dark:#0c3a25;
}

/* ===== BODY ===== */
body{
    font-family:'Courier New', monospace;
    background:#000;
    background-image:
    radial-gradient(rgba(183,55,212,0.15) 1px, transparent 1px),
    radial-gradient(rgba(212,55,209,0.1) 1px, transparent 1px);
    background-size:40px 40px,80px 80px;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
}

/* ===== BACKGROUND GLOW ===== */
body::before{
    content:'';
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at 20% 30%, rgba(212,55,181,0.08), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(234,0,255,0.1), transparent 50%);
    z-index:-1;
    animation:pulseBg 8s ease-in-out infinite;
}

@keyframes pulseBg{
    0%,100%{opacity:0.5;}
    50%{opacity:1;}
}

/* ===== CONTAINER ===== */
.container{
    max-width:420px;
    width:90%;
    padding:25px 20px;
    display:flex;
    flex-direction:column;
    gap:15px;
    background:rgba(10,8,2,0.7);
    backdrop-filter:blur(10px);
    border:2px solid rgba(212,120,55,0.3);
    border-radius:30px;
    position:relative;
    overflow:hidden;
    animation:fadeInUp 0.8s ease;
}

/* ===== CAHAYA MUTAR (INI YANG KAMU MAU) ===== */
.container::before{
    content:'';
    position:absolute;
    top:-2px;left:-2px;right:-2px;bottom:-2px;
    background:conic-gradient(
        from 0deg,
        transparent,
        var(--gold),
        var(--gold-light),
        var(--gold),
        transparent
    );
    border-radius:32px;
    z-index:-2;
    animation:rotateBorder 6s linear infinite;
}

/* ===== LAYER DALAM ===== */
.container::after{
    content:'';
    position:absolute;
    inset:2px;
    background:rgba(0,0,0,0.9);
    border-radius:28px;
    z-index:-1;
}

/* ===== ANIMASI ===== */
@keyframes rotateBorder{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

@keyframes fadeInUp{
    from{opacity:0;transform:translateY(30px);}
    to{opacity:1;transform:translateY(0);}
}

/* ===== LOGO ===== */
.logo{
    width:225px;
    margin:auto;
    animation:tada 3s infinite;
}

@keyframes tada{
    0%{transform:scale(1);}
    50%{transform:scale(1.1) rotate(3deg);}
    100%{transform:scale(1);}
}

/* ===== TEXT ===== */
.welcome h3{
    font-size:14px;
    color:var(--gold);
    text-align:center;
    border-right:3px solid var(--gold);
    white-space:nowrap;
    overflow:hidden;
    animation:typing 6s steps(30,end) infinite alternate;
}

@keyframes typing{
    0%{width:0;}
    50%{width:100%;}
    100%{width:0;}
}

/* ===== BANNER ===== */
.banner{
    width:100%;
    border-radius:20px;
}

/* ===== BUTTON ===== */
.btn-daftar{
    display:block;
    text-align:center;
    padding:16px;
    border-radius:50px;
    background:#fe8104;
    color:#000;
    font-weight:800;
    text-decoration:none;
    transition:.3s;
}
.btn-daftar:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 30px #fe8104;
}

/* ===== SPARKLE ===== */
.gold-sparkle{
    position:fixed;
    inset:0;
    pointer-events:none;
}
.gold-sparkle span{
    position:absolute;
    width:6px;height:6px;
    background:#d4af37;
    border-radius:50%;
    animation:sparkle 3s infinite;
}
@keyframes sparkle{
    0%{opacity:0;transform:scale(0);}
    50%{opacity:.8;transform:scale(1);}
    100%{opacity:0;}
}

</style>
</head>

<body>

<div class="gold-sparkle">
<span style="top:10%;left:20%"></span>
<span style="top:30%;left:80%"></span>
<span style="top:70%;left:40%"></span>
<span style="top:85%;left:70%"></span>
</div>

<div class="container">

<img src="https://ik.imagekit.io/xj4beo5cn/logo.png" class="logo">

<div class="welcome">
<h3>Selamat Datang Di HKB77</h3>
</div>

<img src="https://ik.imagekit.io/xj4beo5cn/photo_6291750957339054344_y.jpg" class="banner">

<a href="https://hkb77daftar.com/tiktok" target="_blank" class="btn-daftar">
DAFTAR
</a>

<p style="text-align:center;font-size:12px;color:#ccc;">
MASUK MAIN DAN MENANG SIMPLE!
</p>

</div>

</body>
</html>
